services:
  mycobot_ros2:
    build:
      context: .
      network: host
    container_name: mycobot_ros2
    network_mode: "host"
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev:rw
      - ./custom_ws:/root/custom_ws:rw
    tty: true
    stdin_open: true
